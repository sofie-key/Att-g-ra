<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--o:#DE6032;--s:#3E4756;--sage:#A8B5A2;--sand:#D9C8B6;--w:#F8F6F2;--r:4px;--rl:10px}
body{font-family:"EB Garamond",Georgia,serif;background:#EDECEA;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:2.5rem 1rem}
.app{width:100%;max-width:680px;padding:2rem 2.25rem;background:var(--w);border-radius:var(--rl);border:0.5px solid var(--sand)}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;border-bottom:1px solid var(--sand);padding-bottom:1.25rem;flex-wrap:wrap}
.top-bar h1{font-size:19px;font-weight:600;color:var(--s);flex:1;letter-spacing:0.01em;display:flex;align-items:center;gap:8px}
.btn{padding:5px 14px;border:1px solid var(--s);border-radius:var(--r);background:transparent;font-size:13px;font-family:"EB Garamond",Georgia,serif;color:var(--s);cursor:pointer;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--s);color:var(--w)}
.btn.muted{border-color:var(--sand);color:var(--sage)}
.btn.muted:hover{background:var(--sage);border-color:var(--sage);color:white}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.tab{padding:6px 18px;border-radius:20px;border:1px solid var(--sand);background:transparent;font-size:13px;font-family:"EB Garamond",Georgia,serif;color:var(--s);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;transition:all 0.15s;user-select:none;text-align:center}
.tab:hover{border-color:var(--s)}
.tab.active{background:var(--s);color:var(--w);border-color:var(--s)}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab-edit{background:none;border:none;cursor:pointer;color:inherit;padding:0 0 0 4px;opacity:0;transition:opacity 0.15s;line-height:1;font-size:14px}
.tab:hover .tab-edit{opacity:0.6}
.tab.drag-over{opacity:0.5;border-style:dashed}
.add-row{display:flex;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap}
.add-row input,.add-row select{font-family:"EB Garamond",Georgia,serif;font-size:13px;padding:0 10px;height:34px;border:1px solid var(--sand);border-radius:var(--r);background:white;color:var(--s);outline:none}
.add-row input{flex:1;min-width:120px}
.add-row input:focus{border-color:var(--s)}
.add-row select{padding:0 6px;flex-shrink:0;max-width:130px}
.cat-block{margin-bottom:0.9rem}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:4px 6px;border-radius:var(--r);cursor:grab;user-select:none}
.cat-header:hover{background:rgba(62,71,86,0.04)}
.cat-header.drag-over{border:1px dashed var(--sage);background:rgba(168,181,162,0.1)}
.cat-drag-handle{color:var(--sand);font-size:12px;cursor:grab;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.cat-header:hover .cat-drag-handle{opacity:1}
.cat-name{font-size:11px;font-weight:500;color:var(--sage);letter-spacing:0.04em;text-transform:uppercase;flex:1}
.cat-name.faded{opacity:0.4}
.cat-icon-btn{background:none;border:none;cursor:pointer;color:var(--sage);padding:2px 4px;border-radius:var(--r);display:inline-flex;align-items:center;opacity:0;transition:all 0.15s;font-size:13px}
.cat-header:hover .cat-icon-btn{opacity:1}
.cat-icon-btn:hover{color:var(--s)}
.cat-input{font-size:12px;font-weight:600;font-family:"EB Garamond",Georgia,serif;color:var(--s);border:1px solid var(--s);border-radius:var(--r);padding:2px 6px;background:var(--w);outline:none;letter-spacing:0.03em;flex:1}
.task-card{background:white;border:1px solid var(--sand);border-radius:var(--r);margin-bottom:4px;overflow:visible;transition:opacity 0.15s;cursor:grab}
.task-card:hover{border-color:var(--sage)}
.task-card.done{opacity:0.45}
.task-card.dragging{opacity:0.3;cursor:grabbing}
.task-card.drag-over{border:1px dashed var(--o);}
.task-main{display:flex;align-items:center;gap:9px;padding:10px 12px}
.drag-handle{color:var(--sand);font-size:12px;cursor:grab;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.task-card:hover .drag-handle{opacity:1}
.task-main input[type=checkbox]{width:15px;height:15px;accent-color:var(--o);flex-shrink:0;cursor:pointer}
.task-text{flex:1;font-size:14px;color:var(--s)}
.task-card.done .task-text{text-decoration:line-through;color:var(--sage)}
.task-input{flex:1;font-size:14px;font-family:"EB Garamond",Georgia,serif;border:1px solid var(--s);border-radius:var(--r);padding:2px 7px;background:var(--w);color:var(--s);outline:none}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0;font-family:"EB Garamond",Georgia,serif}
.status-pill{font-size:11px;font-weight:500;font-family:"EB Garamond",Georgia,serif;border-radius:10px;border:1px solid transparent;padding:2px 9px;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;outline:none;line-height:1.4;text-align:center;text-align-last:center}
.icon-btn{background:none;border:none;color:var(--sage);cursor:pointer;padding:2px 4px;border-radius:var(--r);flex-shrink:0;display:inline-flex;align-items:center;transition:color 0.15s;font-size:13px}
.icon-btn:hover{color:var(--s)}
.del-btn,.edit-btn{opacity:0;transition:opacity 0.15s}
.task-card:hover .del-btn,.task-card:hover .edit-btn{opacity:1}
.detail{border-top:1px solid var(--sand);padding:10px 12px;display:flex;flex-direction:column;gap:9px;background:var(--w)}
.drow{display:flex;align-items:flex-start;gap:10px}
.dlabel{font-size:11px;color:var(--sage);width:72px;flex-shrink:0;padding-top:5px;font-style:italic}
.status-sel{font-size:12px;padding:4px 7px;border-radius:var(--r);border:1px solid var(--sand);background:white;color:var(--s);cursor:pointer;font-family:"EB Garamond",Georgia,serif}
.comment-box{width:100%;font-size:13px;resize:vertical;border:1px solid var(--sand);border-radius:var(--r);padding:7px 9px;background:white;color:var(--s);font-family:"EB Garamond",Georgia,serif;min-height:56px;line-height:1.5}
.comment-box:focus{outline:none;border-color:var(--s)}
.comment-prev{font-size:12px;color:var(--sage);padding:4px 12px 9px 36px;cursor:pointer;display:block;line-height:1.4;font-style:italic}
.tdate{font-size:11px;color:var(--sage);white-space:nowrap}
.sub-tasks{padding:0 12px 8px 32px;display:flex;flex-direction:column;gap:3px}
.sub-task{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--s);padding:3px 0}
.sub-task input[type=checkbox]{width:13px;height:13px;accent-color:var(--sage);flex-shrink:0;cursor:pointer}
.sub-task.done-sub span{text-decoration:line-through;color:var(--sage)}
.sub-task-input{flex:1;font-size:13px;font-family:"EB Garamond",Georgia,serif;border:none;border-bottom:1px solid var(--sand);background:transparent;color:var(--s);outline:none;padding:2px 0}
.sub-task-del{background:none;border:none;color:var(--sage);cursor:pointer;font-size:12px;opacity:0;padding:0 2px}
.sub-task:hover .sub-task-del{opacity:1}
.add-sub-btn{background:none;border:none;font-family:"EB Garamond",Georgia,serif;font-size:12px;color:var(--sage);cursor:pointer;padding:3px 0 3px 32px;display:block;font-style:italic}
.add-sub-btn:hover{color:var(--s)}
.empty{font-size:13px;color:var(--sage);padding:20px 0;text-align:center;font-style:italic}
.proj-lbl{font-size:13px;font-weight:600;color:var(--s);letter-spacing:0.06em;text-transform:uppercase;margin:1rem 0 6px;opacity:1;border-bottom:1.5px solid var(--s);padding-bottom:4px}
.arch-toggle{background:none;border:none;color:var(--sage);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;font-family:"EB Garamond",Georgia,serif;margin-top:1.5rem;font-style:italic}
.add-below-wrap{display:flex;justify-content:flex-start;padding:0 0 2px 32px;margin-top:-2px;opacity:0;transition:opacity 0.15s}
.task-card:hover+.add-below-wrap,.add-below-wrap:hover{opacity:1}
.add-below-btn{background:none;border:none;color:var(--sage);cursor:pointer;font-size:13px;padding:1px 4px;font-family:"EB Garamond",Georgia,serif;display:inline-flex;align-items:center;gap:3px;border-radius:var(--r)}
.add-below-btn:hover{color:var(--s)}
.arch-toggle .arr{display:inline-block;transition:transform 0.2s}
.arch-toggle.open .arr{transform:rotate(90deg)}
.arch-list{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.arch-card{display:flex;align-items:center;gap:9px;padding:8px 12px;background:white;border:1px solid var(--sand);border-radius:var(--r);opacity:0.6}
.arch-text{font-size:13px;text-decoration:line-through;color:var(--sage);flex:1}
.popup-wrap{position:relative;display:inline-flex}
.popup-body{position:absolute;top:100%;left:0;z-index:99;margin-top:4px}
.pmenu{background:white;border:1px solid var(--sand);border-radius:var(--r);padding:8px;min-width:200px;box-shadow:0 2px 8px rgba(62,71,86,0.1)}
.plabel{font-size:11px;color:var(--sage);font-style:italic;padding:2px 4px 5px;display:block}
.pname-input{width:100%;font-family:"EB Garamond",Georgia,serif;font-size:13px;padding:5px 8px;border:1px solid var(--sand);border-radius:var(--r);background:var(--w);color:var(--s);outline:none;margin-bottom:7px}
.pname-input:focus{border-color:var(--s)}
.psave{width:100%;font-family:"EB Garamond",Georgia,serif;font-size:12px;padding:5px 8px;border:1px solid var(--s);border-radius:var(--r);background:var(--s);color:var(--w);cursor:pointer;margin-bottom:8px}
.pdel{width:100%;font-family:"EB Garamond",Georgia,serif;font-size:12px;padding:5px 8px;border:1px solid #F09595;border-radius:var(--r);background:transparent;color:#791F1F;cursor:pointer;margin-bottom:4px}
.color-row{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0}
.swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s;flex-shrink:0;display:inline-block}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:var(--s)}

.main-nav{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:2px solid var(--sand)}
.main-nav-btn{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:6px 18px;font-family:"EB Garamond",Georgia,serif;font-size:14px;color:var(--sage);cursor:pointer;transition:all 0.15s;font-weight:500}
.main-nav-btn:hover{color:var(--s)}
.main-nav-btn.active{color:var(--s);border-bottom-color:var(--o)}
/* --- DEADLINE & PRIORITY --- */
.deadline-btn{background:none;border:none;cursor:pointer;color:var(--sage);font-size:12px;font-family:"EB Garamond",Georgia,serif;padding:1px 4px;border-radius:var(--r);flex-shrink:0;display:inline-flex;align-items:center;gap:3px;transition:color 0.15s}
.deadline-btn:hover{color:var(--s)}
.deadline-btn.has-date{color:var(--s);font-weight:500}
.deadline-btn.soon{color:#8B5E00;font-weight:600}
.deadline-btn.overdue{color:#c0392b;font-weight:600}
.task-card.deadline-soon{border-left:3px solid #EF9F27;background:#FFFBF5}
.task-card.deadline-overdue{border-left:3px solid #c0392b;background:#FFF5F5}
.prio-ref-card.deadline-soon{border-left:3px solid #EF9F27;background:#FFFBF5}
.prio-ref-card.deadline-overdue{border-left:3px solid #c0392b;background:#FFF5F5}
.cal-cell.has-soon{background:#FFFBF5}
.cal-cell.has-overdue{background:#FFF5F5}
.cal-task-chip.chip-soon{border-left:2px solid #EF9F27}
.cal-task-chip.chip-overdue{border-left:2px solid #c0392b}
.deadline-input{font-family:"EB Garamond",Georgia,serif;font-size:12px;border:1px solid var(--sand);border-radius:var(--r);padding:2px 6px;color:var(--s);background:white;outline:none;cursor:pointer}
.deadline-input:focus{border-color:var(--s)}
.prio-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:1px 3px;flex-shrink:0;line-height:1;opacity:0.35;transition:opacity 0.15s}
.prio-btn.on{opacity:1}
.task-card:hover .prio-btn{opacity:0.6}
.task-card:hover .prio-btn.on{opacity:1}
/* --- PRIO SECTION --- */
.prio-section{margin-bottom:1.2rem;background:#FFFBF5;border:1px solid #EFC96A;border-radius:var(--r);padding:10px 14px}
.prio-section-title{font-size:11px;font-weight:600;color:#624500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prio-ref-card{background:white;border:1px solid var(--sand);border-radius:var(--r);margin-bottom:4px;overflow:visible}
.prio-ref-card:hover{border-color:var(--sage)}
/* --- CALENDAR TAB --- */
.cal-wrap{padding:0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav-btn{background:none;border:1px solid var(--sand);border-radius:var(--r);cursor:pointer;padding:4px 10px;font-family:"EB Garamond",Georgia,serif;font-size:13px;color:var(--s)}
.cal-nav-btn:hover{background:var(--s);color:var(--w)}
.cal-month-label{font-size:16px;font-weight:600;color:var(--s);letter-spacing:0.01em}
.cal-grid{display:grid;grid-template-columns:28px repeat(7,1fr);gap:3px}
.cal-day-name{font-size:11px;color:var(--sage);text-align:center;padding:3px 0;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.cal-week-num{font-size:10px;color:var(--sand);text-align:center;padding:3px 0;font-weight:600;letter-spacing:0.02em;display:flex;align-items:center;justify-content:center}
.cal-week-label{font-size:9px;color:var(--sand);text-align:center;padding:3px 0;font-weight:500;letter-spacing:0.03em;text-transform:uppercase;display:flex;align-items:center;justify-content:center}
.cal-cell{height:90px;overflow:hidden;background:white;border:1px solid var(--sand);border-radius:var(--r);padding:4px 5px;position:relative}
.cal-cell.other-month{background:#F8F6F2;opacity:0.5}
.cal-cell.today{border-color:var(--o);border-width:1.5px}
.cal-date-num{font-size:11px;font-weight:600;color:var(--sage);margin-bottom:3px}
.cal-cell.today .cal-date-num{color:var(--o)}
.cal-task-chip{font-size:10px;font-family:"EB Garamond",Georgia,serif;border-radius:3px;padding:1px 4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;line-height:1.4}
.cal-task-chip:hover{opacity:0.8}
.cal-more{font-size:10px;color:var(--sage);font-style:italic;margin-top:1px}

/* --- DEADLINE TIMELINE --- */
.timeline-wrap{margin-top:1.5rem}
.timeline-title{font-size:11px;font-weight:600;color:var(--sage);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.9rem;padding-bottom:5px;border-bottom:1px solid var(--sand)}
.timeline-title.tl-title-overdue{color:#c0392b;border-bottom-color:#F09595}
.tl-group{margin-bottom:1.1rem}
.tl-date-label{font-size:11px;font-weight:600;color:var(--sage);letter-spacing:0.03em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.tl-date-label::after{content:"";flex:1;height:1px;background:var(--sand)}
.tl-date-label.tl-overdue{color:#c0392b}
.tl-date-label.tl-soon{color:#8B5E00}
.tl-date-label.tl-today{color:var(--o)}
.tl-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--sand);background:white;margin-bottom:3px;cursor:pointer;transition:border-color 0.15s}
.tl-row:hover{border-color:var(--sage)}
.tl-row.tl-row-overdue{border-left:3px solid #c0392b;background:#FFF5F5}
.tl-row.tl-row-soon{border-left:3px solid #EF9F27;background:#FFFBF5}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-text{font-size:13px;color:var(--s);flex:1}
.tl-badge{font-size:11px;padding:1px 7px;border-radius:8px;font-family:"EB Garamond",Georgia,serif;flex-shrink:0}
.tl-days{font-size:11px;color:var(--sage);flex-shrink:0;font-style:italic}
.tl-days.overdue{color:#c0392b;font-style:normal;font-weight:600}
.tl-days.soon{color:#8B5E00;font-weight:600;font-style:normal}

/* --- KANBAN --- */
.kanban-wrap{display:flex;gap:8px;padding-bottom:8px;align-items:flex-start}
.kanban-col{flex:1 1 0;min-width:0;background:var(--w);border:1px solid var(--sand);border-radius:var(--r);display:flex;flex-direction:column;max-height:calc(100vh - 220px)}
.kanban-col-header{padding:10px 12px 8px;border-bottom:1px solid var(--sand);display:flex;align-items:center;gap:7px;flex-shrink:0}
.kanban-col-title{font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;flex:1}
.kanban-col-count{font-size:11px;color:var(--sage);font-weight:400}
.kanban-col-body{padding:8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;min-height:60px}
.kanban-col-body.drag-over-col{background:rgba(168,181,162,0.08);border-radius:var(--r)}
.kanban-card{background:white;border:1px solid var(--sand);border-radius:var(--r);padding:9px 10px;cursor:grab;user-select:none;transition:opacity 0.15s,box-shadow 0.15s}
.kanban-card:hover{border-color:var(--sage);box-shadow:0 1px 4px rgba(62,71,86,0.08)}
.kanban-card.dragging{opacity:0.35;cursor:grabbing}
.kanban-card.deadline-soon{border-left:3px solid #EF9F27;background:#FFFBF5}
.kanban-card.deadline-overdue{border-left:3px solid #c0392b;background:#FFF5F5}
.kanban-card-text{font-size:13px;color:var(--s);line-height:1.35;margin-bottom:5px}
.kanban-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kanban-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-family:"EB Garamond",Georgia,serif}
.kanban-dl{font-size:10px;font-family:"EB Garamond",Georgia,serif;font-weight:500}
.kanban-prio{font-size:11px;line-height:1}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>
      <svg style="width:18px;height:18px;fill:none;stroke:#DE6032;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Att göra
    </h1>
    <button class="btn" id="newProjBtn">+ Nytt projekt</button>
  </div>
  <div class="main-nav" id="mainNav">
    <button class="main-nav-btn active" id="navTasks">Uppgifter</button>
    <button class="main-nav-btn" id="navKanban">Status</button>
    <button class="main-nav-btn" id="navCal">Kalender</button>
  </div>
  <div id="taskSection">
  <div class="tabs" id="tabs"></div>
  <div id="prioSection" class="prio-section" style="display:none"><div class="prio-section-title">⭐ Prioriterade</div><div id="prioList"></div></div>
  <div class="add-row">
    <input type="text" id="newTask" placeholder="Ny uppgift…">
    <select id="taskProj"></select>
    <select id="taskCat"></select>
    <button class="btn" id="addTaskBtn">+ Lägg till</button>
  </div>
  <div id="taskList"></div>
  </div><!-- end taskSection -->
  <div id="kanbanView" style="display:none"></div>
  <div id="calView" style="display:none" class="cal-wrap"></div>
  <div id="emptyMsg" class="empty" style="display:none">Inga aktiva uppgifter i denna vy.</div>
  <div id="catPanel" style="display:none;margin-top:0.75rem;background:white;border:1px solid var(--sand);border-radius:var(--r);padding:12px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:12px;font-weight:600;color:var(--s);letter-spacing:0.04em;text-transform:uppercase">Kategorier</span>
      <button class="btn muted" id="addCatBtn" style="font-size:12px;padding:3px 10px">+ Ny</button>
    </div>
    <div id="catPanelList"></div>
  </div>
  <button class="btn muted" id="toggleCatPanel" style="font-size:12px;padding:4px 12px;margin-top:0.5rem;display:none">Hantera kategorier</button>
  <button class="arch-toggle" id="archBtn">
    <span class="arr">&#9658;</span>
    <span id="archLabel">Arkiv</span>
  </button>
  <div class="arch-list" id="archList" style="display:none"></div>
</div>
<script>
var PAL=[
  {sw:"#378ADD",bg:"#E6F1FB",tx:"#0C447C",bo:"#85B7EB"},
  {sw:"#7F77DD",bg:"#EEEDFE",tx:"#3C3489",bo:"#AFA9EC"},
  {sw:"#1D9E75",bg:"#E1F5EE",tx:"#085041",bo:"#5DCAA5"},
  {sw:"#EF9F27",bg:"#FAEEDA",tx:"#633806",bo:"#EFC96A"},
  {sw:"#D4537E",bg:"#FBEAF0",tx:"#72243E",bo:"#ED93B1"},
  {sw:"#639922",bg:"#EAF3DE",tx:"#27500A",bo:"#97C459"},
  {sw:"#C05CA8",bg:"#F9EBFA",tx:"#6B1F6A",bo:"#DC9ED8"},
  {sw:"#3AADA8",bg:"#E3F6F5",tx:"#0E5956",bo:"#7DD0CD"},
  {sw:"#E06B1A",bg:"#FEF0E6",tx:"#813300",bo:"#F0A86A"},
  {sw:"#5B82C4",bg:"#EBF0FA",tx:"#1E3F7A",bo:"#96B2E0"},
  {sw:"#B5860D",bg:"#FAF3DC",tx:"#624500",bo:"#D4B24A"},
  {sw:"#2DB37A",bg:"#E0F6ED",tx:"#0A5C3A",bo:"#6DD1A8"},
  {sw:"#C44B6C",bg:"#FAECF0",tx:"#6B1530",bo:"#E090A8"},
  {sw:"#7B5EA7",bg:"#F0EBF9",tx:"#3D1F6E",bo:"#B59ED6"},
  {sw:"#1E8FAD",bg:"#E2F4F9",tx:"#0B4A5E",bo:"#6DC3D9"},
  {sw:"#9C6B2E",bg:"#F6EFE3",tx:"#4E3010",bo:"#C8A06A"}
];
var ST=[
  {key:"todo",    label:"Att göra",   bg:"#ECEEF1",tx:"#2A3140",bo:"#3E4756"},
  {key:"progress",label:"Pågående",   bg:"#FDF0EB",tx:"#8B3A1C",bo:"#DE6032"},
  {key:"done",    label:"Klar",       bg:"#F0F3EF",tx:"#5A6B56",bo:"#A8B5A2"}
];
function sm(k){return ST.find(function(s){return s.key===k;})||ST[0];}
function cf(pid){
  var p=P.find(function(x){return x.id===pid;});
  if(p&&p.ci!=null)return PAL[p.ci%PAL.length];
  return PAL[P.findIndex(function(x){return x.id===pid;})%PAL.length]||PAL[0];
}
function nid(){return "_"+Math.random().toString(36).slice(2);}
function fd(s){if(!s)return"";return new Date(s).toLocaleDateString("sv-SE",{month:"short",day:"numeric"});}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}

var P=[
  {id:"p1",name:"Webbprojekt",ci:0,cats:[{id:"c1",name:"Design"},{id:"c2",name:"Utveckling"}]},
  {id:"p2",name:"Marknadsföring",ci:1,cats:[{id:"c3",name:"Innehåll"}]},
  {id:"p3",name:"Intern",ci:2,cats:[]}
];
var T=[
  {id:"t1",text:"Designa startsida",proj:"p1",cat:"c1",status:"progress",comment:"Fokus på hero-sektionen och mobilvy.",done:false,arch:false,doneAt:null,exp:false,edit:false,subs:[]},
  {id:"t2",text:"Bygga kontaktformulär",proj:"p1",cat:"c2",status:"todo",comment:"",done:false,arch:false,doneAt:null,exp:false,edit:false,subs:[]},
  {id:"t3",text:"Skriva nyhetsbrev",proj:"p2",cat:"c3",status:"todo",comment:"",done:false,arch:false,doneAt:null,exp:false,edit:false,subs:[]},
  {id:"t4",text:"Boka konferensrum",proj:"p3",cat:null,status:"done",comment:"",done:true,arch:true,doneAt:"2025-06-14",exp:false,edit:false,subs:[]}
];
var ap="all",archOpen=false,openPop=null,editCat=null;
var dragTask=null,dragCat=null,dragProj=null;

var dbReady=false;
var saveTimer=null;
function save(){
  try{localStorage.setItem("km_p",JSON.stringify(P));localStorage.setItem("km_t",JSON.stringify(T));}catch(e){}
  if(!dbReady)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    var db=window._fbDb;if(!db)return;
    var setDoc=window._fbFirestore.setDoc,doc=window._fbFirestore.doc;
    setDoc(doc(db,"attgora","data"),{projects:JSON.stringify(P),tasks:JSON.stringify(T)}).catch(function(e){console.error("Firebase save",e);});
  },500);
}
function load(){
  try{
    var p=localStorage.getItem("km_p"),t=localStorage.getItem("km_t");
    if(p)P=JSON.parse(p);
    if(t){T=JSON.parse(t);T.forEach(function(tx){if(!tx.subs)tx.subs=[];if(tx.deadline===undefined)tx.deadline=null;if(tx.prio===undefined)tx.prio=false;});}
  }catch(e){}
  var db=window._fbDb;
  if(!db){dbReady=true;return;}
  var getDoc=window._fbFirestore.getDoc,doc=window._fbFirestore.doc;
  getDoc(doc(db,"attgora","data")).then(function(snap){
    if(snap.exists()){
      var d=snap.data();
      if(d.projects)P=JSON.parse(d.projects);
      if(d.tasks){T=JSON.parse(d.tasks);T.forEach(function(tx){if(!tx.subs)tx.subs=[];if(tx.deadline===undefined)tx.deadline=null;if(tx.prio===undefined)tx.prio=false;});}
      render();
    }
    dbReady=true;
  }).catch(function(e){console.error("Firebase load",e);dbReady=true;});
}

document.addEventListener("click",function(e){
  if(openPop&&!e.target.closest(".popup-wrap")){openPop=null;renderTabs();}
  if(editCat&&!e.target.closest(".cat-input")&&!e.target.closest(".cat-icon-btn"))saveCat();
});
document.getElementById("newProjBtn").onclick=function(){
  var id=nid(),ci=P.length%PAL.length;
  P.push({id:id,name:"Nytt projekt",ci:ci,cats:[]});
  openPop=id;save();render();
  setTimeout(function(){var e=document.getElementById("pn_"+id);if(e){e.focus();e.select();}},40);
};
document.getElementById("addTaskBtn").onclick=addTask;
document.getElementById("newTask").onkeydown=function(e){if(e.key==="Enter")addTask();};
document.getElementById("taskProj").onchange=renderCatSel;
document.getElementById("addCatBtn").onclick=addCategory;
document.getElementById("archBtn").onclick=function(){
  archOpen=!archOpen;
  document.getElementById("archBtn").classList.toggle("open",archOpen);
  renderArch();
};

document.getElementById("navTasks").onclick=function(){setMainView("tasks");};
document.getElementById("navKanban").onclick=function(){setMainView("kanban");};
document.getElementById("navCal").onclick=function(){setMainView("cal");};

function setProj(id){if(openPop){openPop=null;renderTabs();return;}ap=id;render();}

function toggleProjMenu(id,e){
  e.stopPropagation();
  openPop=openPop===id?null:id;
  renderTabs();
  if(openPop)setTimeout(function(){var e=document.getElementById("pn_"+id);if(e){e.focus();e.select();}},30);
}
function saveProjName(id){
  var e=document.getElementById("pn_"+id);if(!e)return;
  var v=e.value.trim();
  var proj=P.find(function(p){return p.id===id;});
  if(proj&&v)proj.name=v;
  save();openPop=null;render();
}
function deleteProj(id){
  if(P.length<=1){alert("Du måste ha minst ett projekt.");return;}
  P=P.filter(function(p){return p.id!==id;});
  T=T.filter(function(t){return t.proj!==id;});
  if(ap===id)ap="all";
  save();openPop=null;render();
}
function setProjColor(id,i){
  var proj=P.find(function(p){return p.id===id;});if(!proj)return;
  proj.ci=i;save();renderTabs();
}

// Project drag-and-drop
function projDragStart(id,e){
  dragProj=id;e.dataTransfer.effectAllowed="move";
}
function projDragOver(id,e){
  e.preventDefault();e.dataTransfer.dropEffect="move";
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("drag-over");});
  var el=document.getElementById("tab_"+id);if(el)el.classList.add("drag-over");
}
function projDrop(id,e){
  e.preventDefault();
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("drag-over");});
  if(!dragProj||dragProj===id)return;
  var fi=P.findIndex(function(p){return p.id===dragProj;});
  var ti=P.findIndex(function(p){return p.id===id;});
  if(fi<0||ti<0)return;
  var item=P.splice(fi,1)[0];P.splice(ti,0,item);
  dragProj=null;save();render();
}

function addCategory(){
  var pid=ap==="all"?(P[0]&&P[0].id):ap;
  var proj=P.find(function(p){return p.id===pid;});if(!proj)return;
  if(!proj.cats)proj.cats=[];
  var cid=nid();proj.cats.push({id:cid,name:"Ny kategori"});
  editCat=cid;save();renderTasks();
  setTimeout(function(){var e=document.getElementById("cn_"+cid);if(e){e.focus();e.select();}},30);
}
function startCatEdit(cid,e){
  e.stopPropagation();editCat=cid;renderTasks();
  setTimeout(function(){var e=document.getElementById("cn_"+cid);if(e){e.focus();e.select();}},30);
}
function saveCat(){
  if(!editCat)return;
  var e=document.getElementById("cn_"+editCat);
  if(e){var v=e.value.trim();P.forEach(function(p){if(!p.cats)return;var c=p.cats.find(function(c){return c.id===editCat;});if(c&&v)c.name=v;});}
  editCat=null;save();renderTasks();
}
function deleteCat(cid){
  P.forEach(function(p){if(p.cats)p.cats=p.cats.filter(function(c){return c.id!==cid;});});
  T.forEach(function(t){if(t.cat===cid)t.cat=null;});
  save();render();
}

// Category drag-and-drop
function catDragStart(pid,cid,e){
  dragCat={pid:pid,cid:cid};e.dataTransfer.effectAllowed="move";
  e.stopPropagation();
}
function catDragOver(cid,e){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll(".cat-header").forEach(function(h){h.classList.remove("drag-over");});
  var el=document.getElementById("ch_"+cid);if(el)el.classList.add("drag-over");
}
function catDrop(pid,cid,e){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll(".cat-header").forEach(function(h){h.classList.remove("drag-over");});
  if(!dragCat||dragCat.cid===cid||dragCat.pid!==pid)return;
  var proj=P.find(function(p){return p.id===pid;});if(!proj)return;
  var fi=proj.cats.findIndex(function(c){return c.id===dragCat.cid;});
  var ti=proj.cats.findIndex(function(c){return c.id===cid;});
  if(fi<0||ti<0)return;
  var item=proj.cats.splice(fi,1)[0];proj.cats.splice(ti,0,item);
  dragCat=null;save();renderTasks();
}

// Task drag-and-drop
function taskDragStart(id,e){
  dragTask=id;e.dataTransfer.effectAllowed="move";
  e.stopPropagation();
  setTimeout(function(){var el=document.getElementById("tc_"+id);if(el)el.classList.add("dragging");},0);
}
function taskDragEnd(id){
  var el=document.getElementById("tc_"+id);if(el)el.classList.remove("dragging");
  document.querySelectorAll(".task-card").forEach(function(c){c.classList.remove("drag-over");});
  dragTask=null;
}
function taskDragOver(id,e){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll(".task-card").forEach(function(c){c.classList.remove("drag-over");});
  var el=document.getElementById("tc_"+id);if(el&&dragTask!==id)el.classList.add("drag-over");
}
function taskDrop(id,e){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll(".task-card").forEach(function(c){c.classList.remove("drag-over");});
  if(!dragTask||dragTask===id)return;
  var fi=T.findIndex(function(t){return t.id===dragTask;});
  var ti=T.findIndex(function(t){return t.id===id;});
  if(fi<0||ti<0)return;
  // Match category of drop target
  T[fi].cat=T[ti].cat;
  var item=T.splice(fi,1)[0];T.splice(ti,0,item);
  dragTask=null;save();renderTasks();
}

// Sub-tasks
function addSub(tid){
  var t=T.find(function(x){return x.id===tid;});if(!t)return;
  if(!t.subs)t.subs=[];
  var sid=nid();t.subs.push({id:sid,text:"",done:false});
  t.exp=true;save();renderTasks();
  setTimeout(function(){var e=document.getElementById("sub_"+sid);if(e){e.focus();}},30);
}
function saveSubText(tid,sid,val){
  var t=T.find(function(x){return x.id===tid;});if(!t||!t.subs)return;
  var s=t.subs.find(function(x){return x.id===sid;});if(s)s.text=val;save();
}
function toggleSub(tid,sid){
  var t=T.find(function(x){return x.id===tid;});if(!t||!t.subs)return;
  var s=t.subs.find(function(x){return x.id===sid;});if(s)s.done=!s.done;save();renderTasks();
}
function deleteSub(tid,sid){
  var t=T.find(function(x){return x.id===tid;});if(!t||!t.subs)return;
  t.subs=t.subs.filter(function(x){return x.id!==sid;});save();renderTasks();
}

function renderCatSel(){
  var pid=document.getElementById("taskProj").value||(ap!=="all"?ap:(P[0]&&P[0].id));
  var proj=P.find(function(p){return p.id===pid;});
  var cats=proj&&proj.cats||[];
  var sel=document.getElementById("taskCat");sel.innerHTML="";
  var def=document.createElement("option");def.value="";def.textContent="Ingen kategori";sel.appendChild(def);
  cats.forEach(function(c){var o=document.createElement("option");o.value=c.id;o.textContent=c.name;sel.appendChild(o);});
}

function renderTabs(){
  var wrap=document.getElementById("tabs");wrap.innerHTML="";
  var all=el("button","tab"+(ap==="all"?" active":""),"Alla");
  all.onclick=function(){setProj("all");};
  wrap.appendChild(all);
  P.forEach(function(p){
    var c=cf(p.id);
    var n=T.filter(function(t){return t.proj===p.id&&!t.done&&!t.arch;}).length;
    var pw=el("span","popup-wrap");
    var btn=el("button","tab"+(ap===p.id?" active":""));
    btn.id="tab_"+p.id;
    btn.draggable=true;
    btn.ondragstart=function(e){projDragStart(p.id,e);};
    btn.ondragover=function(e){projDragOver(p.id,e);};
    btn.ondrop=function(e){projDrop(p.id,e);};
    btn.ondragend=function(){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("drag-over");});dragProj=null;};
    btn.onclick=function(){setProj(p.id);};
    var dot=el("span","dot");dot.style.background=c.sw;btn.appendChild(dot);
    btn.appendChild(document.createTextNode(p.name));
    if(n>0){var nb=el("span");nb.style.cssText="font-size:11px;opacity:0.6";nb.textContent=" "+n;btn.appendChild(nb);}
    var te=el("span","tab-edit","…");
    te.onclick=function(e){toggleProjMenu(p.id,e);};

function renderCal(){
  var wrap=document.getElementById("calView");wrap.innerHTML="";
  var now=new Date();
  if(typeof window._calYear==="undefined"){window._calYear=now.getFullYear();window._calMonth=now.getMonth();}
  var y=window._calYear,m=window._calMonth;
  var monthNames=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  // Nav
  var nav=el("div","cal-nav");
  var prev=el("button","cal-nav-btn","‹");
  prev.onclick=function(){window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderCal();};
  var next=el("button","cal-nav-btn","›");
  next.onclick=function(){window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderCal();};
  nav.appendChild(prev);
  nav.appendChild(el("span","cal-month-label",monthNames[m]+" "+y));
  nav.appendChild(next);
  wrap.appendChild(nav);
  // Grid
  var grid=el("div","cal-grid");
  grid.appendChild(el("div","cal-week-label","V"));
  var dayNames=["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
  dayNames.forEach(function(d){grid.appendChild(el("div","cal-day-name",d));});

  function getISOWeek(date){
    var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
    var day=d.getUTCDay()||7;
    d.setUTCDate(d.getUTCDate()+4-day);
    var yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d-yearStart)/86400000)+1)/7);
  }
  // First day of month (Monday-based)
  var first=new Date(y,m,1);
  var startDow=first.getDay();if(startDow===0)startDow=7;
  var daysInMonth=new Date(y,m+1,0).getDate();
  var prevDays=new Date(y,m,0).getDate();
  var todayStr=now.toISOString().slice(0,10);
  // Tasks with deadlines this month
  var tasksByDate={};
  T.filter(function(t){return t.deadline&&!t.arch;}).forEach(function(t){
    if(!tasksByDate[t.deadline])tasksByDate[t.deadline]=[];
    tasksByDate[t.deadline].push(t);
  });
  // Fill prev month - insert week num before first cell of each row
  var colPos=0; // 0-6, position within week row
  function maybeInsertWeekNum(dateForWeek){
    if(colPos===0){
      grid.appendChild(el("div","cal-week-num",String(getISOWeek(dateForWeek))));
    }
    colPos=(colPos+1)%7;
  }
  for(var i=startDow-1;i>0;i--){
    var prevDate=new Date(y,m,-(i-1));
    maybeInsertWeekNum(prevDate);
    var cell=el("div","cal-cell other-month");
    cell.appendChild(el("div","cal-date-num",String(prevDays-i+1)));
    grid.appendChild(cell);
  }
  // Fill current month
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=y+"-"+(m+1<10?"0":"")+(m+1)+"-"+(d<10?"0":"")+d;
    maybeInsertWeekNum(new Date(y,m,d));
    var cell=el("div","cal-cell"+(dateStr===todayStr?" today":""));
    cell.appendChild(el("div","cal-date-num",String(d)));
    var tasks=tasksByDate[dateStr]||[];
    var maxShow=3;
    var calToday=new Date();calToday.setHours(0,0,0,0);
    var calEow=new Date(calToday);var calDow=calToday.getDay();calEow.setDate(calToday.getDate()+(calDow===0?0:7-calDow));
    tasks.slice(0,maxShow).forEach(function(t){
      var c=cf(t.proj);
      var dlD=new Date(t.deadline);
      var isOvd=dlD<calToday,isSn=!isOvd&&dlD<=calEow;
      if(isOvd&&!cell.classList.contains("has-overdue"))cell.classList.add("has-overdue");
      else if(isSn&&!cell.classList.contains("has-overdue")&&!cell.classList.contains("has-soon"))cell.classList.add("has-soon");
      var chipCls="cal-task-chip"+(isOvd?" chip-overdue":isSn?" chip-soon":"");
      var chip=el("span",chipCls,t.text);
      chip.style.background=c.bg;chip.style.color=c.tx;
      chip.onclick=(function(id){return function(){
        var tx=T.find(function(x){return x.id===id;});
        if(tx){ap=tx.proj;tx.exp=true;setMainView("tasks");setTimeout(function(){var el=document.getElementById("tc_"+id);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},200);}
      };})(t.id);
      cell.appendChild(chip);
    });
    if(tasks.length>maxShow)cell.appendChild(el("div","cal-more","+"+(tasks.length-maxShow)+" till"));
    grid.appendChild(cell);
  }
  // Fill next month
  var totalCells=(startDow-1)+daysInMonth;
  var remaining=(7-totalCells%7)%7;
  for(var n=1;n<=remaining;n++){
    maybeInsertWeekNum(new Date(y,m+1,n));
    var cell=el("div","cal-cell other-month");
    cell.appendChild(el("div","cal-date-num",String(n)));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);

  // --- Deadline timeline ---
  var tlAllTasks=T.filter(function(t){return t.deadline&&!t.arch&&!t.done;});
  tlAllTasks.sort(function(a,b){return a.deadline<b.deadline?-1:a.deadline>b.deadline?1:0;});
  if(tlAllTasks.length===0)return;
  var tlToday=new Date();tlToday.setHours(0,0,0,0);
  var todayISO=tlToday.toISOString().slice(0,10);
  var ovdTasks=tlAllTasks.filter(function(t){return new Date(t.deadline)<tlToday;});
  var upcomTasks=tlAllTasks.filter(function(t){return new Date(t.deadline)>=tlToday;});

  function makeTlRow(t,isOvd,isSn){
    var c=cf(t.proj),proj=P.find(function(p){return p.id===t.proj;});
    var rowCls="tl-row"+(isOvd?" tl-row-overdue":isSn?" tl-row-soon":"");
    var row=el("div",rowCls);
    var dot=el("span","tl-dot");dot.style.background=c.sw;row.appendChild(dot);
    row.appendChild(el("span","tl-text",t.text));
    if(proj){var bdg=el("span","tl-badge",proj.name);bdg.style.background=c.bg;bdg.style.color=c.tx;bdg.style.border="1px solid "+c.bo;row.appendChild(bdg);}
    row.onclick=(function(id,pid){return function(){ap=pid;setMainView("tasks");setTimeout(function(){var tx=T.find(function(x){return x.id===id;});if(tx)tx.exp=true;renderTasks();setTimeout(function(){var el=document.getElementById("tc_"+id);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},80);},150);};})(t.id,t.proj);
    return row;
  }

  function buildGroups(tasks){
    var groups={};var order=[];
    tasks.forEach(function(t){if(!groups[t.deadline]){groups[t.deadline]=[];order.push(t.deadline);}groups[t.deadline].push(t);});
    return{groups:groups,order:order};
  }

  var tlWrap=el("div","timeline-wrap");

  // --- Overdue section ---
  if(ovdTasks.length>0){
    tlWrap.appendChild(el("div","timeline-title tl-title-overdue","Förfallna ("+ovdTasks.length+")"));
    var ovd=buildGroups(ovdTasks);
    ovd.order.forEach(function(dateStr){
      var dlD=new Date(dateStr);
      var diffDays=Math.round((tlToday-dlD)/(1000*60*60*24));
      var dayLabel=diffDays===1?"1 dag sedan":diffDays+" dagar sedan";
      var dateFormatted=dlD.toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric"});
      var grpEl=el("div","tl-group");
      grpEl.appendChild(el("div","tl-date-label tl-overdue",dateFormatted.charAt(0).toUpperCase()+dateFormatted.slice(1)+" — "+dayLabel));
      ovd.groups[dateStr].forEach(function(t){grpEl.appendChild(makeTlRow(t,true,false));});
      tlWrap.appendChild(grpEl);
    });
  }

  // --- Upcoming: split into this week vs later ---
  var tlEow=new Date(tlToday);var tlDow=tlToday.getDay();tlEow.setDate(tlToday.getDate()+(tlDow===0?0:7-tlDow));
  var thisWeekTasks=upcomTasks.filter(function(t){return new Date(t.deadline)<=tlEow;});
  var laterTasks=upcomTasks.filter(function(t){return new Date(t.deadline)>tlEow;});

  function renderTlGroup(tasks,isSoonGroup){
    var g=buildGroups(tasks);
    g.order.forEach(function(dateStr){
      var dlD=new Date(dateStr);
      var isToday=dateStr===todayISO;
      var diffDays=Math.round((dlD-tlToday)/(1000*60*60*24));
      var dayLabel=isToday?"Idag":diffDays===1?"Imorgon":"Om "+diffDays+" dagar";
      var dateFormatted=dlD.toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric"});
      var lblCls="tl-date-label"+(isSoonGroup?" tl-soon":isToday?" tl-today":"");
      var grpEl=el("div","tl-group");
      grpEl.appendChild(el("div",lblCls,dateFormatted.charAt(0).toUpperCase()+dateFormatted.slice(1)+" — "+dayLabel));
      g.groups[dateStr].forEach(function(t){grpEl.appendChild(makeTlRow(t,false,isSoonGroup));});
      tlWrap.appendChild(grpEl);
    });
  }

  if(thisWeekTasks.length>0){
    tlWrap.appendChild(el("div","timeline-title","Denna vecka"));
    renderTlGroup(thisWeekTasks,true);
  }
  if(laterTasks.length>0){
    tlWrap.appendChild(el("div","timeline-title","Kommande"));
    renderTlGroup(laterTasks,false);
  }

  wrap.appendChild(tlWrap);
}

    hdr.appendChild(el("span","kanban-col-count",tasks.length||""));
    col.appendChild(hdr);
    // Body
    var body=el("div","kanban-col-body");
    body.dataset.status=st.key;
    body.ondragover=function(e){e.preventDefault();body.classList.add("drag-over-col");};
    body.ondragleave=function(){body.classList.remove("drag-over-col");};
    body.ondrop=function(e){
      e.preventDefault();body.classList.remove("drag-over-col");
      if(!kanbanDragId)return;
      var tx=T.find(function(x){return x.id===kanbanDragId;});
      if(tx&&tx.status!==st.key){
        tx.status=st.key;
        if(st.key==="done"){tx.done=true;tx.doneAt=new Date().toISOString().slice(0,10);scheduleArchive(kanbanDragId);}
        else{tx.done=false;tx.doneAt=null;tx.arch=false;}
        save();renderKanban();
      }
      kanbanDragId=null;
    };
    tasks.forEach(function(t){
      var dl=t.deadline?new Date(t.deadline):null;
      var isOvd=dl&&dl<today,isSn=dl&&!isOvd&&dl<=eow;
      var cardCls="kanban-card"+(isOvd?" deadline-overdue":isSn?" deadline-soon":"");
      var card=el("div",cardCls);
      card.draggable=true;
      card.ondragstart=function(e){kanbanDragId=t.id;card.classList.add("dragging");e.dataTransfer.effectAllowed="move";};
      card.ondragend=function(){card.classList.remove("dragging");kanbanDragId=null;};
      card.appendChild(el("div","kanban-card-text",t.text));
      var meta=el("div","kanban-card-meta");
      var proj=P.find(function(p){return p.id===t.proj;});
      if(proj){var c=cf(t.proj);var bdg=el("span","kanban-badge",proj.name);bdg.style.background=c.bg;bdg.style.color=c.tx;bdg.style.border="1px solid "+c.bo;meta.appendChild(bdg);}
      if(t.deadline){
        var dlSpan=el("span","kanban-dl"+(isOvd?" deadline-btn overdue":isSn?" deadline-btn soon":" deadline-btn has-date"),"📅 "+fd(t.deadline));
        meta.appendChild(dlSpan);
      }
      if(t.prio)meta.appendChild(el("span","kanban-prio","⭐"));
      card.appendChild(meta);
      // Click to jump to task in list
      card.onclick=function(){ap=t.proj;var tx2=T.find(function(x){return x.id===t.id;});if(tx2)tx2.exp=true;setMainView("tasks");setTimeout(function(){var el=document.getElementById("tc_"+t.id);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},150);};
      body.appendChild(card);
    });
    if(tasks.length===0){var emp=el("div","empty","Inga uppgifter");emp.style.padding="12px 0";body.appendChild(emp);}
    col.appendChild(body);
    board.appendChild(col);
  });
  wrap.appendChild(board);
}

function addTaskBelow(refId){
  var ref=T.find(function(x){return x.id===refId;});if(!ref)return;
  var newTask={id:nid(),text:"",proj:ref.proj,cat:ref.cat,status:"todo",comment:"",done:false,arch:false,doneAt:null,exp:false,edit:true,subs:[],deadline:null,prio:false};
  var idx=T.indexOf(ref);
  T.splice(idx+1,0,newTask);
  save();renderTasks();
  setTimeout(function(){var e=document.getElementById("ei_"+newTask.id);if(e){e.focus();}},30);
}
function renderTasks(){
  var vp=ap==="all"?P:[P.find(function(p){return p.id===ap;})].filter(Boolean);
  var allV=T.filter(function(t){return !t.arch&&(ap==="all"||t.proj===ap);});
  var wrap=document.getElementById("taskList");wrap.innerHTML="";
  var hasAny=false;
  vp.forEach(function(proj){
    if(!proj)return;
    var cats=proj.cats||[];
    var pt=allV.filter(function(t){return t.proj===proj.id;});
    if(!pt.length&&editCat===null)return;
    if(ap==="all"&&P.length>1)wrap.appendChild(el("div","proj-lbl",proj.name));
    cats.forEach(function(cat){
      var ct=pt.filter(function(t){return t.cat===cat.id;});
      if(!ct.length&&editCat!==cat.id)return;
      hasAny=true;
      var cb=el("div","cat-block");
      var ch=el("div","cat-header");
      ch.id="ch_"+cat.id;
      ch.draggable=true;
      ch.ondragstart=function(e){catDragStart(proj.id,cat.id,e);};
      ch.ondragover=function(e){catDragOver(cat.id,e);};
      ch.ondrop=function(e){catDrop(proj.id,cat.id,e);};
      ch.ondragend=function(){document.querySelectorAll(".cat-header").forEach(function(h){h.classList.remove("drag-over");});dragCat=null;};
      ch.appendChild(el("span","cat-drag-handle","⠿"));
      if(editCat===cat.id){
        var ci=el("input","cat-input");ci.id="cn_"+cat.id;ci.value=cat.name;
        ci.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();saveCat();}if(e.key==="Escape"){editCat=null;renderTasks();}};
        ci.onblur=saveCat;ch.appendChild(ci);
      } else {
        ch.appendChild(el("span","cat-name",cat.name));
      }
      var eb=el("button","cat-icon-btn","✎");
      eb.onclick=(function(cid){return function(e){startCatEdit(cid,e);};})(cat.id);
      var db=el("button","cat-icon-btn","×");
      db.onclick=(function(cid){return function(e){e.stopPropagation();deleteCat(cid);};})(cat.id);
      ch.appendChild(eb);ch.appendChild(db);cb.appendChild(ch);
      ct.forEach(function(t){cb.appendChild(makeCard(t));});
      if(ct.length>0){
        var lastT=ct[ct.length-1];
        var aw=el("div","add-below-wrap");
        var ab=el("button","add-below-btn","+ Lägg till");
        ab.onclick=(function(id){return function(e){e.stopPropagation();addTaskBelow(id);};})(lastT.id);
        aw.appendChild(ab);cb.appendChild(aw);
      }
      wrap.appendChild(cb);
    });
    var ucat=pt.filter(function(t){return !t.cat||!cats.find(function(c){return c.id===t.cat;});});
    if(ucat.length){
      hasAny=true;
      if(cats.length>0){
        var ub=el("div","cat-block");
        var uh=el("div","cat-header");uh.appendChild(el("span","cat-name faded","Övriga"));ub.appendChild(uh);
        ucat.forEach(function(t){ub.appendChild(makeCard(t));});
        if(ucat.length>0){
          var lastU=ucat[ucat.length-1];
          var aw=el("div","add-below-wrap");
          var ab=el("button","add-below-btn","+ Lägg till");
          ab.onclick=(function(id){return function(e){e.stopPropagation();addTaskBelow(id);};})(lastU.id);
          aw.appendChild(ab);ub.appendChild(aw);
        }
        wrap.appendChild(ub);
      } else {
        ucat.forEach(function(t){wrap.appendChild(makeCard(t));});
        if(ucat.length>0){
          var lastB=ucat[ucat.length-1];
          var aw=el("div","add-below-wrap");
          var ab=el("button","add-below-btn","+ Lägg till");
          ab.onclick=(function(id){return function(e){e.stopPropagation();addTaskBelow(id);};})(lastB.id);
          aw.appendChild(ab);wrap.appendChild(aw);
        }
      }
    }
  });
  document.getElementById("emptyMsg").style.display=hasAny?"none":"block";
  document.getElementById("addCatBtn").style.display=ap==="all"?"none":"inline-flex";
}

function unarchive(id){
  var t=T.find(function(x){return x.id===id;});if(!t)return;
  t.arch=false;t.done=false;t.doneAt=null;t.status="todo";
  save();render();
}
function renderArch(){
  var arch=T.filter(function(t){return t.arch&&(ap==="all"||t.proj===ap);});
  document.getElementById("archLabel").textContent="Arkiv ("+arch.length+")";
  var wrap=document.getElementById("archList");
  if(!archOpen){wrap.style.display="none";return;}
  wrap.style.display="flex";wrap.innerHTML="";
  if(!arch.length){wrap.appendChild(el("p","empty","Inga arkiverade uppgifter."));return;}
  // Clear archive button
  var clearRow=el("div");clearRow.style.cssText="display:flex;justify-content:flex-end;margin-bottom:6px;";
  var clearBtn=el("button","btn muted","Rensa arkiv");clearBtn.style.cssText="font-size:11px;padding:3px 10px;color:#c0392b;border-color:#F09595;";
  clearBtn.onclick=function(){
    if(!confirm("Vill du permanent ta bort alla "+arch.length+" arkiverade uppgifter?"))return;
    var archIds=arch.map(function(t){return t.id;});
    T=T.filter(function(t){return archIds.indexOf(t.id)===-1;});
    save();render();
  };
  clearRow.appendChild(clearBtn);wrap.appendChild(clearRow);
  arch.forEach(function(t){
    var c=cf(t.proj),proj=P.find(function(pr){return pr.id===t.proj;});
    var card=el("div","arch-card");
    card.appendChild(el("span","arch-text",t.text));
    if(proj){var b=el("span","badge",proj.name);b.style.background=c.bg;b.style.color=c.tx;b.style.border="1px solid "+c.bo;card.appendChild(b);}
    if(t.doneAt)card.appendChild(el("span","tdate",fd(t.doneAt)));
    // Undo button
    var ub=el("button","btn muted","↩ Ångra");ub.style.cssText="font-size:11px;padding:2px 8px;margin-left:auto;";
    ub.onclick=(function(id){return function(){unarchive(id);};})(t.id);
    card.appendChild(ub);
    // Delete button
    var db=el("button","icon-btn","×");
    db.onclick=(function(id){return function(){T=T.filter(function(x){return x.id!==id;});save();render();};})(t.id);
    card.appendChild(db);wrap.appendChild(card);
  });
}

var mainView="tasks"; // "tasks", "kanban" or "cal"
function setMainView(v){
  mainView=v;
  document.getElementById("navTasks").classList.toggle("active",v==="tasks");
  document.getElementById("navKanban").classList.toggle("active",v==="kanban");
  document.getElementById("navCal").classList.toggle("active",v==="cal");
  render();
}
function render(){
  var isCal=mainView==="cal",isKanban=mainView==="kanban";
  document.getElementById("taskSection").style.display=(isCal||isKanban)?"none":"";
  document.getElementById("calView").style.display=isCal?"":"none";
  document.getElementById("kanbanView").style.display=isKanban?"":"none";
  if(isCal){renderCal();}
  else if(isKanban){renderKanban();}
  else{renderTabs();renderSel();renderPrio();renderTasks();renderArch();}
}
function endOfWeekMs(){var now=new Date();now.setHours(23,59,59,999);var d=now.getDay();var daysToSun=d===0?0:7-d;now.setDate(now.getDate()+daysToSun);return now.getTime();}
function scheduleArchive(id){
  var t=T.find(function(x){return x.id===id;});if(!t||!t.done)return;
  var delay=endOfWeekMs()-Date.now();
  setTimeout(function(){var tx=T.find(function(x){return x.id===id;});if(tx&&tx.done){tx.arch=true;save();render();}},Math.max(delay,500));
}
function markDone(t){
  t.done=true;t.status="done";t.doneAt=new Date().toISOString().slice(0,10);
  scheduleArchive(t.id);
}
function markUndone(t){
  t.done=false;t.arch=false;t.doneAt=null;t.status="todo";
}
function toggleDone(id){
  var t=T.find(function(x){return x.id===id;});if(!t)return;
  if(t.done)markUndone(t);else markDone(t);
  save();render();
}
function setStatus(id,val){
  var t=T.find(function(x){return x.id===id;});if(!t)return;
  if(val==="done"){markDone(t);}
  else{markUndone(t);t.status=val;}
  save();render();
}
function addTask(){
  var text=document.getElementById("newTask").value.trim();if(!text)return;
  var pid=document.getElementById("taskProj").value||(P[0]&&P[0].id)||"";
  var cid=document.getElementById("taskCat").value||null;
  T.unshift({id:nid(),text:text,proj:pid,cat:cid,status:"todo",comment:"",done:false,arch:false,doneAt:null,exp:false,edit:false,subs:[],deadline:null,prio:false});
  document.getElementById("newTask").value="";save();render();
  if(ap!=="all"&&ap!==pid)setProj(pid);
}
function saveEdit(id){
  var t=T.find(function(x){return x.id===id;}),e=document.getElementById("ei_"+id);
  if(t&&e){var v=e.value.trim();if(v)t.text=v;t.edit=false;save();renderTasks();}
}
// Category panel
function renderCatPanel(){
  var pid=ap==="all"?(P[0]&&P[0].id):ap;
  var panel=document.getElementById("catPanel");
  var list=document.getElementById("catPanelList");
  if(!panel||!list)return;
  var proj=P.find(function(p){return p.id===pid;});
  if(!proj){panel.style.display="none";return;}
  list.innerHTML="";
  var cats=proj.cats||[];
  if(cats.length===0){
    var emp=document.createElement("p");emp.style.cssText="font-size:12px;color:var(--sage);font-style:italic;padding:2px 0 6px";emp.textContent="Inga kategorier ännu.";list.appendChild(emp);
  }
  cats.forEach(function(cat){
    var row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--sand)";
    var inp=document.createElement("input");
    inp.style.cssText="flex:1;font-family:'EB Garamond',Georgia,serif;font-size:13px;border:none;background:transparent;color:var(--s);outline:none;padding:2px 0";
    inp.value=cat.name;
    inp.onchange=(function(cid){return function(){
      var proj2=P.find(function(p){return p.id===pid;});
      if(!proj2)return;
      var c2=proj2.cats.find(function(c){return c.id===cid;});
      if(c2&&this.value.trim())c2.name=this.value.trim();
      save();renderTasks();renderCatSel();
    };})(cat.id);
    inp.onkeydown=function(e){if(e.key==="Enter")this.blur();};
    row.appendChild(inp);
    var db=document.createElement("button");
    db.style.cssText="background:none;border:none;color:var(--sage);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0";
    db.textContent="×";
    db.onclick=(function(cid){return function(){deleteCat(cid);renderCatPanel();};})(cat.id);
    row.appendChild(db);
    list.appendChild(row);
  });
}

var catPanelOpen=false;
document.getElementById("toggleCatPanel").onclick=function(){
  catPanelOpen=!catPanelOpen;
  document.getElementById("catPanel").style.display=catPanelOpen?"block":"none";
  this.textContent=catPanelOpen?"Stäng kategorier":"Hantera kategorier";
  if(catPanelOpen)renderCatPanel();
};
document.getElementById("addCatBtn").onclick=function(){
  var pid=ap==="all"?(P[0]&&P[0].id):ap;
  var proj=P.find(function(p){return p.id===pid;});if(!proj)return;
  if(!proj.cats)proj.cats=[];
  var cid=nid();proj.cats.push({id:cid,name:"Ny kategori"});
  save();renderTasks();renderCatSel();renderCatPanel();
  // Focus the new input
  setTimeout(function(){
    var inputs=document.getElementById("catPanelList").querySelectorAll("input");
    if(inputs.length)inputs[inputs.length-1].select();
  },30);
};

// Override render to also update panel
var _origRender=render;
render=function(){_origRender();
  var isCal=mainView==="cal";
  var toggleBtn=document.getElementById("toggleCatPanel");
  if(toggleBtn)toggleBtn.style.display=(ap==="all"||isCal)?"none":"inline-flex";
  var panel=document.getElementById("catPanel");
  if(panel&&catPanelOpen&&!isCal)renderCatPanel();
};

load();render();
